name: Auto Tag

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest tag
        id: latest
        run: |
          tag=$(git tag --sort=-v:refname | grep '^v' | head -1)
          echo "tag=${tag:-v0.0.0}" >> "$GITHUB_OUTPUT"

      - name: Determine version bump
        id: bump
        run: |
          current="${{ steps.latest.outputs.tag }}"
          current="${current#v}"

          if [ "${{ steps.latest.outputs.tag }}" = "v0.0.0" ]; then
            commits=$(git log --oneline | head -20)
          else
            commits=$(git log --oneline "${{ steps.latest.outputs.tag }}..HEAD")
          fi

          # Conventional Commitsに基づくバージョン判定
          # BREAKING CHANGE or !: → major
          # feat: → minor
          # それ以外(fix:, refactor:, test:, docs:, chore: 等) → patch
          bump="patch"
          if echo "$commits" | grep -qiE '(BREAKING CHANGE|^[a-f0-9]+ [a-z]+(\(.+\))?!:)'; then
            bump="major"
          elif echo "$commits" | grep -qiE '^[a-f0-9]+ feat(\(.+\))?:'; then
            bump="minor"
          fi

          IFS='.' read -r major minor patch <<< "$current"
          case "$bump" in
            major) new_tag="v$((major + 1)).0.0" ;;
            minor) new_tag="v${major}.$((minor + 1)).0" ;;
            patch) new_tag="v${major}.${minor}.$((patch + 1))" ;;
          esac

          echo "bump=$bump" >> "$GITHUB_OUTPUT"
          echo "new_tag=$new_tag" >> "$GITHUB_OUTPUT"
          echo "判定: $bump (${{ steps.latest.outputs.tag }} → $new_tag)"

      - name: Create tag
        run: |
          git tag ${{ steps.bump.outputs.new_tag }}
          git push origin ${{ steps.bump.outputs.new_tag }}
